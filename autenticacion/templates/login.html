<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Virtual UCC - Iniciar Sesión</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Iniciar Sesión</h1>
            <p class="subtitle">Ingresa tus credenciales para continuar</p>

            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            {% if message %}
                <div class="alert alert-success">
                    <strong>¡Bienvenido!</strong> Login exitoso
                </div>
                
                <div class="token-display">
                    <label>Rol:</label>
                    <p><strong>{{ role }}</strong></p>
                </div>

                <div class="token-display">
                    <label>Access Token:</label>
                    <textarea readonly>{{ access_token }}</textarea>
                </div>

                <div class="token-display">
                    <label>Refresh Token:</label>
                    <textarea readonly>{{ refresh_token }}</textarea>
                </div>
            {% endif %}

            {% if not message %}
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingrese su usuario" required>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Ingrese su contraseña" required>
                </div>

                <button type="submit">Iniciar Sesión</button>
            </form>

            <div class="auth-links">
                ¿No tienes cuenta? <a href="/api/auth/register/">Regístrate aquí</a>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
